# VPS Override — uses existing findata_db and panther-net
# The existing findata_db container (with seeded data) is connected to panther-net manually.
# This override removes the findata_db service from compose management.
# Pre-requisites (run once):
#   docker network create panther-net
#   docker network connect panther-net findata_db
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.vps-override.yml --env-file .env up --build -d

version: '3.8'

networks:
  panther-net:
    external: true

volumes:
  n8n_data:

services:
  # Exclude findata_db — use existing container already on panther-net
  findata_db:
    profiles: ["skip"]

  n8n:
    depends_on: []

  panther-api:
    depends_on: []

  panther-frontend:
    depends_on:
      - panther-api
