name: CI — Build Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package.json
      - run: npm install
        working-directory: backend
      - run: node -e "require('./src/index.js')" &
        working-directory: backend
        continue-on-error: true

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package.json
      - run: npm install
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: /api
